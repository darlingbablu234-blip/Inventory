{% extends 'inventory/base.html' %}

{% block title %}Delete Supplier{% endblock %}

{% block content %}
<div class="card">
    <h2>Delete Supplier</h2>
    <p>Are you sure you want to delete the supplier <strong>{{ object.name }}</strong>?</p>
    <p style="color: #dc3545;">This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'supplier_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
