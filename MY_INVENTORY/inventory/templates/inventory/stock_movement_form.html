{% extends 'inventory/base.html' %}

{% block title %}Stock Movement{% endblock %}

{% block content %}
<div class="card">
    <h2>Record Stock Movement</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.item.id_for_label }}">Item</label>
            {{ form.item }}
        </div>
        <div class="form-group">
            <label for="{{ form.quantity.id_for_label }}">Quantity</label>
            {{ form.quantity }}
        </div>
        <div class="form-group">
            <label for="{{ form.movement_type.id_for_label }}">Movement Type</label>
            {{ form.movement_type }}
        </div>
        <div class="form-group">
            <label for="{{ form.reason.id_for_label }}">Reason</label>
            {{ form.reason }}
        </div>
        <button type="submit" class="btn btn-primary">Record Movement</button>
        <a href="{% url 'item_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
