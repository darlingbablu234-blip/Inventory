version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=your-secret-key-here
      - ALLOWED_HOSTS=localhost,127.0.0.1,your-domain.com
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 myinventory.wsgi:application
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
